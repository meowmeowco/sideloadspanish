<body>
  <h1>Test Page: Article-Noun Compound Replacement</h1>

  <p id="definite-feminine">The house is beautiful.</p>

  <p id="definite-masculine">The book is on the table.</p>

  <p id="indefinite-masculine">I saw a dog in the park.</p>

  <p id="indefinite-feminine">She bought a table for the kitchen.</p>

  <p id="capitalised">The city is large. The house is small.</p>

  <p id="standalone-article">The quick brown fox jumps over.</p>

  <p id="mixed">The house has a door and the water is cold.</p>
